# ScaleController Rev-A — ESPHome configuration
#
# Target: ESP32-C3-WROOM-02-H4  (RISC-V, Wi-Fi + BLE)
# Flashing: via the on-board CP2102N USB-UART bridge (USB-C connector).
#
# Verified pin map (from the KiCad netlist, 2026-07-05):
#   HX711 DOUT  -> GPIO6
#   HX711 PD_SCK-> GPIO5
#   I2C  SDA    -> GPIO4
#   I2C  SCL    -> GPIO3
#   Tare button -> GPIO9    (reuses the on-board BOOT button SW1; active-low)
#   Status LED  -> GPIO19   (to be added to the schematic)
#
# Copy secrets.yaml.example to secrets.yaml and fill in your values before building.

substitutions:
  name: scale-controller
  friendly_name: "Scale Controller"
  # ---- Calibration ----
  # 1. Power on with an empty platform and press Tare (or the HA "Tare" button).
  # 2. Place a known mass (e.g. 1000 g) and read "Scale Raw Counts".
  # 3. calibration_factor = known_mass_g / (raw_counts_with_mass - raw_counts_tared)
  # 4. Put that number below and re-flash.
  calibration_factor: "1.0"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret ap_password

captive_portal:

# ---- I2C bus (OLED) ----
i2c:
  id: bus_a
  sda: GPIO4
  scl: GPIO3
  scan: true

# ---- Persistent tare offset ----
globals:
  - id: tare_offset
    type: float
    restore_value: yes
    initial_value: "0"

# ---- Sensors ----
sensor:
  - platform: hx711
    id: hx711_raw
    name: "Scale Raw Counts"
    dout_pin: GPIO6
    clk_pin: GPIO5
    gain: 128
    update_interval: 250ms
    internal: true          # raw counts; used for calibration/tare, hidden from HA
    filters:
      - median:
          window_size: 7
          send_every: 4

  - platform: template
    id: weight_g
    name: "Weight"
    unit_of_measurement: "g"
    accuracy_decimals: 1
    update_interval: 250ms
    lambda: |-
      return (id(hx711_raw).state - id(tare_offset)) * ${calibration_factor};
    filters:
      - exponential_moving_average:
          alpha: 0.2
          send_every: 1

# ---- Tare: on-board BOOT button (SW1, GPIO9) + a button entity in Home Assistant ----
# GPIO9 is the BOOT strapping pin. It is only special during power-on/reset;
# at runtime it is a normal input, so SW1 doubles as the tare button.
binary_sensor:
  - platform: gpio
    id: tare_button
    name: "Tare Button"
    pin:
      number: GPIO9
      mode:
        input: true
        pullup: true
      inverted: true         # active-low: SW1 pulls the pin to GND when pressed
    on_press:
      then:
        - script.execute: do_tare

button:
  - platform: template
    name: "Tare"
    on_press:
      then:
        - script.execute: do_tare

script:
  - id: do_tare
    then:
      - lambda: 'id(tare_offset) = id(hx711_raw).state;'
      - light.turn_on:
          id: status_light
          flash_length: 200ms

# ---- Status LED (GPIO19) ----
output:
  - platform: gpio
    id: status_led_output
    pin: GPIO19

light:
  - platform: binary
    id: status_light
    name: "Status LED"
    output: status_led_output

# ---- OLED display (SSD1306 128x64 @ 0x3C) ----
font:
  - file: "gfonts://Roboto"
    id: font_large
    size: 24
  - file: "gfonts://Roboto"
    id: font_small
    size: 12

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    i2c_id: bus_a
    lambda: |-
      it.printf(0, 0, id(font_small), "Weight");
      it.printf(127, 22, id(font_large), TextAlign::TOP_RIGHT, "%.1f g", id(weight_g).state);
